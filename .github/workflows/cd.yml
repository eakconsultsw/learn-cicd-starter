name: cd

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build-Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: build the app
        run: |
          # all envs set ??
          ./scripts/buildprod.sh

      # 1️⃣  Debug‐Modus aktivieren (optional)
      - name: Enable step‑debug (requires secret ACTIONS_STEP_DEBUG)
        run: echo "Debug‑mode active"

      # 2️⃣  Show environment (ohne Secrets)
      - name: Show environment
        run: env | sort

      # 3️⃣  Write SA key to file (für Debug‑Zwecke)
      #- name: Write SA key
      #  run: |
      #    echo "${{ secrets.GCP_SA_KEY }}" > /tmp/sa-key.json
       #   chmod 600 /tmp/sa-key.json
      #    ls -l /tmp/sa-key.json

      # 4️⃣  Activate SA (critical)
      - name: Activate service account
        run: |
          gcloud auth activate-service-account \
            cloud-run-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --key-file=<(printf "%s" "${{ secrets.GCP_SA_KEY }}")
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      # 5️⃣  Verify auth + IAM membership
      - name: Verify
        run: |
          gcloud auth list
          gcloud projects get-iam-policy ${{ secrets.GCP_PROJECT_ID }} \
            --flatten="bindings[].members" \
            --format="table(bindings.role, bindings.members)" \
            | grep "$(gcloud config get-value account)"
    # ---------------------------------------------------------------
    # 3️⃣  Build Docker image with Cloud Build & push to Artifact Registry
    # ---------------------------------------------------------------
      - name: Build & push Docker image to Artifact Registry
        env:
          REGION:     ${{ secrets.GCP_REGION }}          # e.g. europe-west1
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REPOSITORY: ${{ secrets.ARTIFACT_REPO }}       # name of the AR repo
          IMAGE:      ${{ secrets.IMAGE_NAME }}          # desired image name
          TAG:        ${{ github.sha }}                  # or any tag you prefer
        run: |
          FULL_TAG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${TAG}"
          echo "Building and pushing ${FULL_TAG}"
          gcloud builds submit --tag "${FULL_TAG}" .           

