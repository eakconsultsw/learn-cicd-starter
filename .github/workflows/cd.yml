name: cd

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build-Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: build the app
        run: |
          # all envs set ??
          ./scripts/buildprod.sh

 # ---------------------------------------------------------------
    # 2️⃣  Install & configure the gcloud CLI, authenticate with GCP
    # ---------------------------------------------------------------
      - name: Write GCP SA key to file
        id: write-key
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/sa-key.json
          chmod 600 /tmp/sa-key.json
          echo "key_path=/tmp/sa-key.json" >> $GITHUB_OUTPUT

      # --------------------------------------------------
      # 3️⃣  Activate the service account (critical!)
      # --------------------------------------------------
      - name: Activate service account
        run: |
          gcloud auth activate-service-account \
            cloud-run-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --key-file="${{ steps.write-key.outputs.key_path }}"
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"

      # --------------------------------------------------
      # 4️⃣  (Optional) Verify that the account is active
      # --------------------------------------------------
      - name: Verify authentication
        run: |
          gcloud auth list
          gcloud config get-value project

     # - name: Configure gcloud defaults
     #   run: |
     #     gcloud config set account cloud-run-deployer@notely-500811.iam.gserviceaccount.com
     #     gcloud config set compute/region ${{ secrets.GCP_REGION }}

    # ---------------------------------------------------------------
    # 3️⃣  Build Docker image with Cloud Build & push to Artifact Registry
    # ---------------------------------------------------------------
      - name: Build & push Docker image to Artifact Registry
        env:
          REGION:     ${{ secrets.GCP_REGION }}          # e.g. europe-west1
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          REPOSITORY: ${{ secrets.ARTIFACT_REPO }}       # name of the AR repo
          IMAGE:      ${{ secrets.IMAGE_NAME }}          # desired image name
          TAG:        ${{ github.sha }}                  # or any tag you prefer
        run: |
          FULL_TAG="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE}:${TAG}"
          echo "Building and pushing ${FULL_TAG}"
          gcloud builds submit --tag "${FULL_TAG}" .           

